behaviors:
  AgentController:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40000
      learning_rate: 3.0e-4
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear

    network_settings:
      normalize: true
      hidden_units: 128
      num_layers: 2
      vis_encode_type: simple

    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0

    max_steps: 1.0e12
    time_horizon: 512
    summary_freq: 10000
    checkpoint_interval: 50000
    keep_checkpoints: 5

env_settings:
  num_envs: 1
  seed: -1

engine_settings:
  time_scale: 20
  target_frame_rate: -1
  no_graphics: false

checkpoint_settings:
  initialize_from: null
  load_model: false
  resume: false
  force: true
  train_model: true
  inference: false
  results_dir: results